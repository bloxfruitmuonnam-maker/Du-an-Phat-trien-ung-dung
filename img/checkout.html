<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS_sale.css" />
    <title>Thanh Toán Đơn Hàng - Amakirk</title>
  </head>
  <body>
    <header class="top-header">
      <div class="container header-flex">
        <div class="logo">
          <img src="img/logo1.jpg" alt="SPSP Logo" height="70" />
        </div>
        <div
          class="cart"
          onclick="location.href = './checkout.html'"
          style="cursor: pointer"
        >
          <span id="header-cart-info">0 Sản phẩm: 0 đ</span>
          <span class="cart-icon">🛒</span>
        </div>
      </div>
    </header>

    <nav class="nav-bar">
      <div class="container">
        <ul class="menu">
          <li><a href="./index.html">TRANG CHỦ</a></li>
          <li><a href="./Gioithieu.html">GIỚI THIỆU</a></li>
          <li><a href="./sanpham.html">SẢN PHẨM</a></li>
          <li><a href="./sale.html">SALE OFF</a></li>
          <li><a href="./tintuc.html">TIN TỨC</a></li>
          <li><a href="./lienhe.html">LIÊN HỆ</a></li>
        </ul>
      </div>
    </nav>

    <div class="breadcrumb">
      <a href="./index.html" class="breadcrumb-item home">Trang chủ</a>
      <span class="breadcrumb-separator">/</span>
      <a href="./sale.html" class="breadcrumb-item">Sale Off</a>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-item active">Thanh toán</span>
    </div>

    <div class="container" style="margin-top: 30px">
      <div class="checkout-section" id="checkout-area" style="display: block">
        <div class="checkout-grid">
          <div class="cart-summary">
            <h3>🛒 Đơn Hàng Của Bạn</h3>
            <div id="cart-content"></div>
            <div class="total-price" id="cart-total">Tổng cộng: 0 đ</div>
            <button
              onclick="location.href = './sale.html'"
              style="
                margin-top: 15px;
                padding: 10px;
                background: #666;
                color: #fff;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              ← Tiếp tục mua sắm
            </button>
          </div>

          <div class="order-form">
            <h3>📝 Thông Tin Đặt Hàng</h3>
            <form
              action="https:
              method="POST"
              id="purchase-form"
            >
              <input
                type="hidden"
                name="Chi_Tiet_Don_Hang"
                id="form-cart-details"
              />
              <input type="hidden" name="Tong_Tien" id="form-cart-total" />

              <div class="form-group">
                <label for="name">Họ và Tên *</label>
                <input
                  type="text"
                  id="name"
                  name="Ho_Ten"
                  placeholder="Ví dụ: Nguyễn Văn A"
                  required
                />
              </div>

              <div class="form-group">
                <label for="phone">Số Điện Thoại *</label>
                <input
                  type="tel"
                  id="phone"
                  name="So_Dien_Thoai"
                  placeholder="Ví dụ: 0912345678"
                  required
                />
              </div>

              <div class="form-group">
                <label for="address">Địa Chỉ Nhận Hàng *</label>
                <textarea
                  id="address"
                  name="Dia_Chi"
                  rows="3"
                  placeholder="Số nhà, tên đường..."
                  required
                ></textarea>
              </div>

              <div class="form-group">
                <label for="note">Ghi Chú Thêm (Nếu có)</label>
                <input
                  type="text"
                  id="note"
                  name="Ghi_Chu"
                  placeholder="Chọn size giày, màu sắc vợt..."
                />
              </div>

              <button type="submit" class="btn-submit">
                XÁC NHẬN ĐẶT HÀNG GIAO TẬN NƠI
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="cart.js"></script>
  </body>
</html>
